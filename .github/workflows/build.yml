name: Build & Test

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libopencv-dev \
            wget

      - name: Install ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-linux-x64-1.17.0.tgz
          tar xzf onnxruntime-linux-x64-1.17.0.tgz
          sudo cp onnxruntime-linux-x64-1.17.0/lib/* /usr/local/lib/
          sudo cp -r onnxruntime-linux-x64-1.17.0/include/* /usr/local/include/
          sudo ldconfig

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: |
          build/tests/test_pipeline
          build/tests/test_serializer
          build/tests/test_latency_tracker
          build/tests/test_inference

  build-tsan:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libopencv-dev \
            wget

      - name: Install ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-linux-x64-1.17.0.tgz
          tar xzf onnxruntime-linux-x64-1.17.0.tgz
          sudo cp onnxruntime-linux-x64-1.17.0/lib/* /usr/local/lib/
          sudo cp -r onnxruntime-linux-x64-1.17.0/include/* /usr/local/include/
          sudo ldconfig

      - name: Configure CMake with ThreadSanitizer
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_TSAN=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests with TSAN
        run: |
          build/tests/test_pipeline
