<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Analytics Dashboard</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="container">
    <h1>Real-Time Video Analytics</h1>

    <div class="stats-bar">
      <span>FPS: <strong id="fps">--</strong></span>
      <span>Latency: <strong id="latency">--</strong> ms</span>
      <span>Detections: <strong id="det-count">0</strong></span>
      <span>Frame: <strong id="frame-id">--</strong></span>
      <span id="status" class="status disconnected">Disconnected</span>
    </div>

    <div class="video-wrapper">
      <!-- MJPEG stream from server — shows same frames as OpenCV window -->
      <img id="camera" src="/video" alt="Live Feed">
    </div>

    <div id="det-list" class="det-list"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
